name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # PYTHON LINT
  # ═══════════════════════════════════════════════════════════════════════════════
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Check formatting with Black
        run: black --check api/ science/ tests/

      - name: Lint with Ruff
        run: ruff check api/ science/ tests/

  # ═══════════════════════════════════════════════════════════════════════════════
  # PYTHON TESTS
  # ═══════════════════════════════════════════════════════════════════════════════
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install -e science/
          pip install pytest pytest-asyncio

      - name: Run unit tests
        run: pytest tests/unit/ -v

  # ═══════════════════════════════════════════════════════════════════════════════
  # CI SUCCESS (simplified)
  # ═══════════════════════════════════════════════════════════════════════════════
  ci-success:
    name: CI Success
    needs: [python-lint, python-test]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.python-lint.result }}" != "success" ]] || \
             [[ "${{ needs.python-test.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
