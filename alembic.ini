# Soma Database Migrations Configuration
# Documentation: https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration scripts
script_location = alembic

# Template for revision file names (use YYYYMMDD_HHMM format)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# sys.path additions
prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# Max length of revision identifiers
truncate_slug_length = 40

# Set to 'true' for offline mode with raw SQL output
# offline = false

# Version path separator
version_path_separator = os

# Output encoding
output_encoding = utf-8

# Database URL - loaded from environment via env.py
# Override with: alembic -x db_url=postgresql://... upgrade head
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Post-write hooks for formatting generated code
# hooks = black
# black.type = console_scripts
# black.entrypoint = black


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
